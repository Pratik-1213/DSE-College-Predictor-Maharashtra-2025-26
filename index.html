<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DSE College Predictor Maharashtra 2025-26 | Direct Second Year Engineering</title>
    <meta name="description" content="Predict the best engineering colleges and branch options you can get for Direct Second Year Admissions (DSE) in Maharashtra based on previous CAP cutoff marks. Generate strategic option forms and downloadable PDF reports." />
    <!-- Sync dark class before first paint to prevent flash -->
    <script>
      (function() {
        if (localStorage.getItem('theme') === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
