<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Rounded square background with purple gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#6D28D9"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>
  <!-- Graduation cap: flat top board -->
  <polygon points="32,16 52,24 32,32 12,24" fill="white"/>
  <!-- Cap tassel string -->
  <line x1="52" y1="24" x2="52" y2="36" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="52" cy="37.5" r="2.5" fill="white"/>
  <!-- Cap body (hood) -->
  <path d="M20,27.5 L20,38 Q32,45 44,38 L44,27.5 L32,32 Z" fill="white" opacity="0.95"/>
</svg>
